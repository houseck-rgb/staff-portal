<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="최우영씨푸드">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>근로자 정보 입력</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500;700&family=Montserrat:wght@400;500;600&display=swap');

:root {
  --ivory:   #FAFAF7;
  --white:   #FFFFFF;
  --gold:    #B8952A;
  --ink:     #1A1A18;
  --ink-3:   #6A6A64;
  --ink-4:   #A8A8A0;
  --line:    #E8E8E0;
  --entry:   #2A5C3A;
  --entry-bg:#F0F6F2;
  --exit:    #7A2828;
  --exit-bg: #FAF0F0;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--ivory);
  color: var(--ink);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding-bottom: 80px;
}

/* ── Topbar ── */
.topbar {
  width: 100%; max-width: 520px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 0;
}
.topbar-brand {
  font-family: 'Montserrat', sans-serif;
  font-size: 9px; font-weight: 600; letter-spacing: 0.28em;
  color: var(--gold); text-transform: uppercase;
}
.topbar-right { display: flex; align-items: center; gap: 8px; }
.btn-dispatch {
  padding: 7px 15px;
  border: 1.5px solid var(--ink); border-radius: 20px;
  background: var(--ink); color: var(--white);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
  cursor: pointer; transition: all 0.2s;
}
.btn-lang {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--gold); border-radius: 20px;
  background: transparent; color: var(--gold);
  font-family: 'Montserrat', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
  cursor: pointer; transition: all 0.2s;
}
.btn-lang:hover { background: var(--gold); color: var(--white); }

/* ── Header ── */
.header {
  width: 100%; max-width: 520px;
  padding: 20px 24px 24px; text-align: center;
}
.header::after {
  content: ''; display: block; width: 1px; height: 24px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  margin: 16px auto 0;
}
.header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px; font-weight: 300; letter-spacing: 0.08em; color: var(--ink);
}
.header-sub {
  font-family: 'Montserrat', sans-serif;
  font-size: 9px; font-weight: 400; letter-spacing: 0.26em; color: var(--ink-4); margin-top: 5px;
}

/* ── Tabs ── */
.tab-wrap {
  width: 100%; max-width: 520px; padding: 0 24px 20px; display: flex; gap: 10px;
}
.tab-btn {
  flex: 1; padding: 14px 8px;
  border: 1px solid var(--line); background: var(--white); color: var(--ink-4);
  border-radius: 6px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s;
}
.tab-btn.entry.active { background: var(--entry-bg); border-color: var(--entry); color: var(--entry); font-weight: 700; }
.tab-btn.exit.active  { background: var(--exit-bg);  border-color: var(--exit);  color: var(--exit);  font-weight: 700; }

/* ── Card ── */
.card { width: 100%; max-width: 520px; padding: 0 24px; }
.form-section { display: none; flex-direction: column; gap: 12px; }
.form-section.active { display: flex; }
.field-group {
  background: var(--white); border: 1px solid var(--line); border-radius: 10px;
  overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.group-title { padding: 11px 20px 9px; border-bottom: 1px solid var(--line); background: var(--ivory); }
.group-title span { font-family: 'Noto Sans KR', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; color: var(--ink-3); }
.field-row {
  display: flex; align-items: center; padding: 0 20px; min-height: 60px;
  border-bottom: 1px solid var(--line); gap: 12px; transition: background 0.15s;
}
.field-row:last-child { border-bottom: none; }
.field-row:focus-within { background: #FDFDF9; }
.field-label {
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500;
  color: var(--ink-4); white-space: nowrap; min-width: 88px;
}
.form-section.entry .field-label { color: var(--entry); }
.form-section.exit  .field-label { color: var(--exit); }
.field-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 400;
  color: var(--ink); padding: 4px 0; caret-color: var(--gold);
}
.field-input::placeholder { color: #D0D0C8; font-size: 13px; }
.field-input[type="date"] { color-scheme: light; font-family: 'Montserrat', sans-serif; font-size: 15px; }
.salary-val {
  font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500;
  color: var(--gold); flex: 1;
}
.btn-generate {
  width: 100%; padding: 17px; border: none; border-radius: 8px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em;
}
.btn-generate.entry { background: var(--entry); color: #D8F0E0; }
.btn-generate.exit  { background: var(--exit);  color: #F0D8D8; }
.btn-generate:active { transform: scale(0.99); opacity: 0.88; }

/* ── Preview ── */
.preview-wrap { width: 100%; max-width: 520px; padding: 24px 24px 0; display: none; }
.preview-wrap.visible { display: block; }
.preview-label { font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.22em; color: var(--ink-4); text-transform: uppercase; margin-bottom: 10px; }
#previewCanvas { width: 100%; border-radius: 8px; display: block; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
.btn-download {
  width: 100%; margin-top: 12px; padding: 16px;
  border: 1px solid var(--gold); border-radius: 8px;
  background: transparent; color: var(--gold);
  font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.btn-download:hover, .btn-download:active { background: var(--gold); color: var(--white); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--white);
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500;
  padding: 10px 22px; border-radius: 24px;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 1100;
}
/* ── 미리보기 모달 ── */
.preview-modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 1000;
  align-items: flex-end; justify-content: center;
}
.preview-modal-bg.open { display: flex; }
.preview-modal-sheet {
  width: 100%; max-width: 520px; background: var(--white);
  border-radius: 20px 20px 0 0; padding: 12px 24px 52px;
  max-height: 88vh; overflow-y: auto;
  animation: slideUp 0.26s ease;
}
.preview-modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.preview-modal-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 18px; font-weight: 700; color: var(--ink);
}
.preview-box {
  background: var(--ivory);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 20px 20px 16px;
  margin-bottom: 16px;
}
.pv-head { font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 10px; }
.pv-divider { height: 1px; background: var(--gold); opacity: 0.3; margin: 10px 0; }
.pv-row { display: flex; align-items: baseline; gap: 8px; padding: 4px 0; }
.pv-key { font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--ink-4); min-width: 78px; }
.pv-val { font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500; color: var(--ink); word-break: break-all; }
.pv-footer { font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 600; color: var(--gold); letter-spacing: 0.12em; margin-top: 10px; }
.pv-photo-label {
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 500;
  color: var(--entry); background: var(--entry-bg);
  border-radius: 6px; padding: 6px 12px; margin-top: 8px;
  display: inline-block;
}
.pv-thumb-wrap { margin-top: 12px; }
.pv-thumb-label {
  font-family: 'Noto Sans KR', sans-serif; font-size: 11px; font-weight: 500;
  color: var(--ink-4); margin-bottom: 6px;
}
.pv-thumb {
  width: 100%; border-radius: 8px; display: block;
  max-height: 180px; object-fit: cover;
  border: 1px solid var(--line);
}
.btn-kakao {
  width: 100%; padding: 17px; border: none; border-radius: 10px;
  background: #FEE500; color: #3A1D1D;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px; font-weight: 700; letter-spacing: 0.04em;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-kakao:active { transform: scale(0.99); opacity: 0.9; }

/* ── 파출 모달 ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 999;
  align-items: flex-end; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal-sheet {
  width: 100%; max-width: 520px; background: var(--white);
  border-radius: 20px 20px 0 0; padding: 12px 24px 52px;
  max-height: 92vh; overflow-y: auto;
  animation: slideUp 0.26s ease;
}
@keyframes slideUp {
  from { transform: translateY(60px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.modal-handle { width: 40px; height: 4px; background: var(--line); border-radius: 2px; margin: 0 auto 16px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
.modal-title { font-family: 'Noto Sans KR', sans-serif; font-size: 20px; font-weight: 700; color: var(--ink); }
.modal-close {
  width: 32px; height: 32px; border: none; background: var(--line);
  border-radius: 50%; font-size: 14px; color: var(--ink-3);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

.dp-group { margin-bottom: 20px; }
.dp-group-title { font-family: 'Noto Sans KR', sans-serif; font-size: 11px; font-weight: 500; color: var(--ink-4); margin-bottom: 8px; letter-spacing: 0.06em; }
.dp-row {
  display: flex; align-items: center; background: var(--ivory);
  border: 1px solid var(--line); border-radius: 10px;
  padding: 0 16px; min-height: 54px; gap: 12px;
}
.dp-label { font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; color: var(--gold); white-space: nowrap; min-width: 58px; }
.dp-input {
  flex: 1; border: none; outline: none; background: transparent;
  font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 400;
  color: var(--ink); caret-color: var(--gold);
}
.dp-input::placeholder { color: #D0D0C8; font-size: 13px; }
.dp-input[type="date"] { color-scheme: light; font-family: 'Montserrat', sans-serif; font-size: 15px; }
.dp-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.dp-chip {
  padding: 10px 22px; border: 1.5px solid var(--line); border-radius: 24px;
  background: var(--white); color: var(--ink-3);
  font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.18s;
}
.dp-chip.active { background: var(--ink); border-color: var(--ink); color: var(--white); font-weight: 700; }
.dp-send {
  width: 100%; margin-top: 8px; padding: 17px; border: none; border-radius: 10px;
  background: var(--ink); color: var(--white);
  font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.04em;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.dp-send:active { transform: scale(0.99); opacity: 0.88; }

/* ── 사진 찍기 ── */
.dp-photo-row { display: flex; flex-direction: column; gap: 8px; }
.dp-photo-box {
  width: 100%; height: 160px;
  border: 2px dashed var(--line); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; overflow: hidden;
  background: var(--ivory);
}
.dp-photo-box:hover { border-color: var(--gold); background: #FDFDF5; }
.dp-photo-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  color: var(--ink-4);
}
.dp-photo-placeholder span {
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500;
}
.dp-photo-clear {
  align-self: flex-end;
  padding: 5px 14px; border: 1px solid var(--exit); border-radius: 20px;
  background: transparent; color: var(--exit);
  font-family: 'Noto Sans KR', sans-serif; font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all 0.18s;
}
.dp-photo-clear:hover { background: var(--exit); color: var(--white); }
.dp-text-label {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 11px; font-weight: 500; color: var(--ink-4);
  margin: 10px 0 6px; letter-spacing: 0.04em;
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-brand">최우영씨푸드그룹</div>
  <div class="topbar-right">
    <button class="btn-dispatch" onclick="openDispatch()">파출</button>
    <button class="btn-lang" id="btnLang" onclick="translateAll()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span id="langBtnText">English</span>
    </button>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-title" id="hTitle">근로자 정보 입력</div>
  <div class="header-sub" id="hSub">WORKER INFORMATION</div>
</div>

<!-- Tabs -->
<div class="tab-wrap">
  <button class="tab-btn entry active" id="tabEntry" onclick="switchTab('entry')">입사</button>
  <button class="tab-btn exit"         id="tabExit"  onclick="switchTab('exit')">퇴사</button>
</div>

<div class="card">
  <!-- 입사 -->
  <div class="form-section entry active" id="formEntry">
    <div class="field-group">
      <div class="group-title"><span>매장 선택</span></div>
      <div class="field-row" style="flex-wrap:wrap; gap:8px; padding:14px 20px; min-height:unset;">
        <button class="dp-chip active" data-val="구로점"   onclick="selectChip('e_store',this)" id="e_store" style="font-size:13px;padding:8px 16px;">구로점</button>
        <button class="dp-chip"        data-val="여의도점" onclick="selectChip('e_store',this)" style="font-size:13px;padding:8px 16px;">여의도점</button>
        <button class="dp-chip"        data-val="가산점"   onclick="selectChip('e_store',this)" style="font-size:13px;padding:8px 16px;">가산점</button>
        <button class="dp-chip"        data-val="영등포점" onclick="selectChip('e_store',this)" style="font-size:13px;padding:8px 16px;">영등포점</button>
        <button class="dp-chip"        data-val="종로점"   onclick="selectChip('e_store',this)" style="font-size:13px;padding:8px 16px;">종로점</button>
      </div>
    </div>
    <div class="field-group">
      <div class="group-title"><span id="g_e_basic">기본 정보</span></div>
      <div class="field-row">
        <span class="field-label" id="l_e_date">입사일</span>
        <input type="date" class="field-input" id="e_date">
      </div>
      <div class="field-row">
        <span class="field-label" id="l_e_name">성함</span>
        <input type="text" class="field-input" id="e_name" placeholder="홍길동">
      </div>
      <div class="field-row">
        <span class="field-label" id="l_e_reg">등록증번호</span>
        <input type="text" class="field-input" id="e_reg" placeholder="123456-1234567" maxlength="14" oninput="fmtReg(this)">
      </div>
    </div>
    <div class="field-group">
      <div class="group-title"><span id="g_e_acct">계좌 정보</span></div>
      <div class="field-row">
        <span class="field-label" id="l_e_bank">은행명</span>
        <input type="text" class="field-input" id="e_bank" placeholder="국민은행">
      </div>
      <div class="field-row">
        <span class="field-label" id="l_e_acct">계좌번호</span>
        <input type="text" class="field-input" id="e_acct" placeholder="123-456-789012">
      </div>
    </div>
    <div class="field-group">
      <div class="group-title"><span id="g_e_other">기타</span></div>
      <div class="field-row">
        <span class="field-label" id="l_e_email">이메일</span>
        <input type="text" class="field-input" id="e_email" placeholder="name@email.com">
      </div>
      <div class="field-row">
        <span class="field-label" id="l_e_salary">급여</span>
        <span class="salary-val">3,100,000원</span>
      </div>
    </div>
    <button class="btn-generate entry" id="btnGenEntry" onclick="shareInfo('entry')">카카오톡 보내기</button>
  </div>

  <!-- 퇴사 -->
  <div class="form-section exit" id="formExit">
    <div class="field-group">
      <div class="group-title"><span>매장 선택</span></div>
      <div class="field-row" style="flex-wrap:wrap; gap:8px; padding:14px 20px; min-height:unset;">
        <button class="dp-chip active" data-val="구로점"   onclick="selectChip('x_store',this)" id="x_store" style="font-size:13px;padding:8px 16px;">구로점</button>
        <button class="dp-chip"        data-val="여의도점" onclick="selectChip('x_store',this)" style="font-size:13px;padding:8px 16px;">여의도점</button>
        <button class="dp-chip"        data-val="가산점"   onclick="selectChip('x_store',this)" style="font-size:13px;padding:8px 16px;">가산점</button>
        <button class="dp-chip"        data-val="영등포점" onclick="selectChip('x_store',this)" style="font-size:13px;padding:8px 16px;">영등포점</button>
        <button class="dp-chip"        data-val="종로점"   onclick="selectChip('x_store',this)" style="font-size:13px;padding:8px 16px;">종로점</button>
      </div>
    </div>
    <div class="field-group">
      <div class="group-title"><span id="g_x_basic">기본 정보</span></div>
      <div class="field-row">
        <span class="field-label" id="l_x_date">퇴사일</span>
        <input type="date" class="field-input" id="x_date">
      </div>
      <div class="field-row">
        <span class="field-label" id="l_x_name">성함</span>
        <input type="text" class="field-input" id="x_name" placeholder="홍길동">
      </div>
      <div class="field-row">
        <span class="field-label" id="l_x_reg">등록증번호</span>
        <input type="text" class="field-input" id="x_reg" placeholder="123456-1234567" maxlength="14" oninput="fmtReg(this)">
      </div>
    </div>
    <div class="field-group">
      <div class="group-title"><span id="g_x_acct">계좌 정보</span></div>
      <div class="field-row">
        <span class="field-label" id="l_x_bank">은행명</span>
        <input type="text" class="field-input" id="x_bank" placeholder="국민은행">
      </div>
      <div class="field-row">
        <span class="field-label" id="l_x_acct">계좌번호</span>
        <input type="text" class="field-input" id="x_acct" placeholder="123-456-789012">
      </div>
    </div>
    <div class="field-group">
      <div class="group-title"><span id="g_x_other">기타</span></div>
      <div class="field-row">
        <span class="field-label" id="l_x_email">이메일</span>
        <input type="text" class="field-input" id="x_email" placeholder="name@email.com">
      </div>
      <div class="field-row">
        <span class="field-label" id="l_x_salary">급여</span>
        <span class="salary-val">3,100,000원</span>
      </div>
    </div>
    <button class="btn-generate exit" id="btnGenExit" onclick="shareInfo('exit')">카카오톡 보내기</button>
  </div>
</div>

<!-- 미리보기 모달 -->
<div class="preview-modal-bg" id="previewModal" onclick="closePreviewBg(event)">

    <div class="modal-handle"></div>
    <div class="preview-modal-header">
      <div class="preview-modal-title">미리보기</div>
      <button class="modal-close" onclick="closePreview()">✕</button>
    </div>
    <div class="preview-box" id="previewBox"></div>
    <button class="btn-kakao" id="btnDoShare" onclick="doShare()">

        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
      앱 공유하기
    </button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 파출 모달 -->
<div class="modal-bg" id="dispatchModal" onclick="closeDispatchBg(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">파출 안내</div>
      <button class="modal-close" onclick="closeDispatch()">✕</button>
    </div>

    <div class="dp-group">
      <div class="dp-group-title">매장 선택</div>
      <div class="dp-chips" id="dp_store">
        <button class="dp-chip active" data-val="구로점"   onclick="selectChip('dp_store',this)">구로점</button>
        <button class="dp-chip"        data-val="여의도점" onclick="selectChip('dp_store',this)">여의도점</button>
        <button class="dp-chip"        data-val="가산점"   onclick="selectChip('dp_store',this)">가산점</button>
        <button class="dp-chip"        data-val="영등포점" onclick="selectChip('dp_store',this)">영등포점</button>
        <button class="dp-chip"        data-val="종로점"   onclick="selectChip('dp_store',this)">종로점</button>
      </div>
    </div>

    <div class="dp-group">
      <div class="dp-row">
        <span class="dp-label">날짜</span>
        <input type="date" class="dp-input" id="dp_date">
      </div>
    </div>

    <div class="dp-group">
      <div class="dp-group-title">근무 시간</div>
      <div class="dp-chips" id="dp_time">
        <button class="dp-chip active" data-val="오전" onclick="selectChip('dp_time',this)">오전</button>
        <button class="dp-chip"        data-val="오후" onclick="selectChip('dp_time',this)">오후</button>
        <button class="dp-chip"        data-val="풀타임" onclick="selectChip('dp_time',this)">풀타임</button>
      </div>
    </div>

    <div class="dp-group">
      <div class="dp-group-title">포지션</div>
      <div class="dp-chips" id="dp_pos">
        <button class="dp-chip active" data-val="홀"   onclick="selectChip('dp_pos',this)">홀</button>
        <button class="dp-chip"        data-val="주방" onclick="selectChip('dp_pos',this)">주방</button>
        <button class="dp-chip"        data-val="스끼" onclick="selectChip('dp_pos',this)">스끼</button>
      </div>
    </div>

    <div class="dp-group">
      <div class="dp-group-title">등록증 사진</div>
      <div class="dp-photo-row">
        <div class="dp-photo-box" id="box_reg" onclick="triggerPhoto('photo_reg')">
          <div class="dp-photo-placeholder" id="ph_reg">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>사진 찍기</span>
          </div>
          <img id="prev_reg" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:10px;">
        </div>
        <button class="dp-photo-clear" onclick="clearPhoto('photo_reg','prev_reg','ph_reg','box_reg')" style="display:none" id="clr_reg">✕ 삭제</button>
      </div>
      <input type="file" id="photo_reg" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this,'prev_reg','ph_reg','box_reg','clr_reg')">

    <div class="dp-group">
      <div class="dp-group-title">계좌 사진</div>
      <div class="dp-photo-row">
        <div class="dp-photo-box" id="box_acct" onclick="triggerPhoto('photo_acct')">
          <div class="dp-photo-placeholder" id="ph_acct">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>사진 찍기</span>
          </div>
          <img id="prev_acct" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:10px;">
        </div>
        <button class="dp-photo-clear" onclick="clearPhoto('photo_acct','prev_acct','ph_acct','box_acct','clr_acct')" style="display:none" id="clr_acct">✕ 삭제</button>
      </div>
      <input type="file" id="photo_acct" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this,'prev_acct','ph_acct','box_acct','clr_acct')">
      <div class="dp-text-label">없으신 경우 직접 입력</div>
      <div class="dp-row">
        <span class="dp-label">은행명</span>
        <input type="text" class="dp-input" id="dp_bank" placeholder="국민은행">

      <div class="dp-row" style="margin-top:8px;">
        <span class="dp-label">계좌번호</span>

    <button class="dp-send" onclick="sendDispatch()">

        <path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/>
      </svg>
      앱 공유하기
    </button>

<script>
let currentMode = 'entry';
let currentDataUrl = null;
let currentLang = 'ko';

/* ── 파출 모달 ── */
function openDispatch() {
  const t = new Date();
  const yy = t.getFullYear();
  const mm = String(t.getMonth()+1).padStart(2,'0');
  const dd = String(t.getDate()).padStart(2,'0');
  document.getElementById('dp_date').value = yy+'-'+mm+'-'+dd;
  document.getElementById('dispatchModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDispatch() {
  document.getElementById('dispatchModal').classList.remove('open');
  document.body.style.overflow = '';
}
function closeDispatchBg(e) { if(e.target.id==='dispatchModal') closeDispatch(); }

/* ── 등록번호 자동 하이픈 ── */
function fmtReg(el) {
  let v = el.value.replace(/[^0-9]/g, '');
  if (v.length > 6) v = v.slice(0,6) + '-' + v.slice(6,13);
  el.value = v;
}

function selectChip(gid, btn) {
  // 부모 dp-chips 또는 field-row 안의 형제 칩들 모두 inactive
  const parent = btn.parentElement;
  parent.querySelectorAll('.dp-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
}
function getChip(gid) {
  const a = document.querySelector('#'+gid+' .dp-chip.active');
  return a ? a.dataset.val : '';
}
/* ── 사진 찍기 ── */
function triggerPhoto(id) { document.getElementById(id).click(); }
function previewPhoto(input, prevId, phId, boxId, clrId) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById(prevId);
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById(phId).style.display = 'none';
    document.getElementById(clrId).style.display = 'block';
    document.getElementById(boxId).style.border = '2px solid var(--gold)';
  };
  reader.readAsDataURL(file);
}
function clearPhoto(inputId, prevId, phId, boxId, clrId) {
  document.getElementById(inputId).value = '';
  const img = document.getElementById(prevId);
  img.src = ''; img.style.display = 'none';
  document.getElementById(phId).style.display = 'flex';
  document.getElementById(clrId).style.display = 'none';
  document.getElementById(boxId).style.border = '2px dashed var(--line)';
}

async function sendDispatch() {
  const dateRaw  = document.getElementById('dp_date').value;
  const store    = getChip('dp_store');
  const time     = getChip('dp_time');
  const pos      = getChip('dp_pos');
  const reg      = document.getElementById('dp_reg').value.trim();
  const bank     = document.getElementById('dp_bank').value.trim();
  const acctNum  = document.getElementById('dp_acct_num').value.trim();

  let dateStr = '—';
  if(dateRaw){ const[y,m,d]=dateRaw.split('-'); dateStr=y+'년 '+m+'월 '+d+'일'; }

  // 공유 텍스트 (텍스트만 공유 fallback용)
  let msg =
    '[최우영씨푸드 파출 안내]\n\n' +
    '매장   : ' + (store||'—') + '\n' +
    '날짜   : ' + dateStr + '\n' +
    '시간   : ' + (time||'—') + '\n' +
    '포지션 : ' + (pos||'—');
  if(reg)     msg += '\n등록번호 : ' + reg;
  if(bank)    msg += '\n은행명   : ' + bank;
  if(acctNum) msg += '\n계좌번호 : ' + acctNum;
  _shareText = msg;

  // ── 텍스트 카드 이미지 생성 ──
  const lines = [
    { label:'매장',   val: store||'—' },
    { label:'날짜',   val: dateStr },
    { label:'시간',   val: time||'—' },
    { label:'포지션', val: pos||'—' },
  ];
  if(reg)     lines.push({ label:'등록번호', val: reg });
  if(bank)    lines.push({ label:'은행명',   val: bank });
  if(acctNum) lines.push({ label:'계좌번호', val: acctNum });

  const title = '[최우영씨푸드 파출 안내]';
  const cardUrl  = makeCard(title, lines);
  const cardFile = await makeCardFile(title, lines, '파출안내.png');

  // 사진 파일 수집
  const regFile  = document.getElementById('photo_reg').files[0];
  const acctFile = document.getElementById('photo_acct').files[0];
  _dispatchFiles = [cardFile];
  if(regFile)  _dispatchFiles.push(new File([regFile],  '등록증.jpg',  {type: regFile.type}));
  if(acctFile) _dispatchFiles.push(new File([acctFile], '계좌사진.jpg', {type: acctFile.type}));

  // 미리보기 박스
  const box = document.getElementById('previewBox');
  let photoHtml = '';
  const prevReg  = document.getElementById('prev_reg');
  const prevAcct = document.getElementById('prev_acct');
  if(regFile  && prevReg.src)  photoHtml += '<div class="pv-thumb-wrap"><div class="pv-thumb-label">등록증 사진</div><img class="pv-thumb" src="'+prevReg.src+'"></div>';
  if(acctFile && prevAcct.src) photoHtml += '<div class="pv-thumb-wrap"><div class="pv-thumb-label">계좌 사진</div><img class="pv-thumb" src="'+prevAcct.src+'"></div>';

  box.innerHTML =
    '<img src="'+cardUrl+'" style="width:100%;border-radius:8px;display:block;margin-bottom:12px;">' +
    photoHtml;

  closeDispatch();
  document.getElementById('previewModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

/* ── 언어 전환 ── */
const T = {
  ko: {
    hTitle:'근로자 정보 입력', hSub:'WORKER INFORMATION',
    tabEntry:'입사', tabExit:'퇴사',
    g_basic:'기본 정보', g_acct:'계좌 정보', g_other:'기타',
    l_date_e:'입사일', l_date_x:'퇴사일',
    l_name:'성함', l_reg:'등록증번호', l_bank:'은행명',
    l_acct:'계좌번호', l_email:'이메일', l_salary:'급여',
    ph_name:'홍길동', ph_bank:'국민은행',
    btnGenEntry:'카카오톡 보내기', btnGenExit:'카카오톡 보내기',
    btnDownload:'이미지 저장', previewLabel:'미리보기', langBtn:'English',
    cTitle:'근로자 정보', cSub:'WORKER INFORMATION',
    cEntry:'입사', cExit:'퇴사',
    cf_date_e:'입사일', cf_date_x:'퇴사일',
    cf_name:'성함', cf_reg:'등록증번호', cf_bank:'은행명',
    cf_acct:'계좌번호', cf_email:'이메일', cf_salary:'급여',
  },
  en: {
    hTitle:'Worker Information', hSub:'EMPLOYEE RECORD ENTRY',
    tabEntry:'Employment', tabExit:'Resignation',
    g_basic:'Basic Info', g_acct:'Bank Account', g_other:'Other',
    l_date_e:'Start Date', l_date_x:'End Date',
    l_name:'Full Name', l_reg:'ID / Reg. No.', l_bank:'Bank Name',
    l_acct:'Account No.', l_email:'Email', l_salary:'Salary',
    ph_name:'HONG GILDONG', ph_bank:'KOOKMIN BANK',
    btnGenEntry:'Share', btnGenExit:'Share',
    btnDownload:'Download Image', previewLabel:'PREVIEW', langBtn:'한국어',
    cTitle:'Worker Information', cSub:'EMPLOYEE RECORD',
    cEntry:'EMPLOYMENT', cExit:'RESIGNATION',
    cf_date_e:'START DATE', cf_date_x:'END DATE',
    cf_name:'FULL NAME', cf_reg:'ID / REG. NO.', cf_bank:'BANK NAME',
    cf_acct:'ACCOUNT NO.', cf_email:'EMAIL', cf_salary:'SALARY',
  }
};

  currentLang = currentLang==='ko'?'en':'ko';
  const t = T[currentLang];
  document.getElementById('hTitle').textContent = t.hTitle;
  document.getElementById('hSub').textContent   = t.hSub;
  document.getElementById('tabEntry').textContent = t.tabEntry;
  document.getElementById('tabExit').textContent  = t.tabExit;
  ['e','x'].forEach(p=>{
    document.getElementById('g_'+p+'_basic').textContent = t.g_basic;
    document.getElementById('g_'+p+'_acct').textContent  = t.g_acct;
    document.getElementById('g_'+p+'_other').textContent = t.g_other;
    document.getElementById('l_'+p+'_name').textContent  = t.l_name;
    document.getElementById('l_'+p+'_reg').textContent   = t.l_reg;
    document.getElementById('l_'+p+'_bank').textContent  = t.l_bank;
    document.getElementById('l_'+p+'_acct').textContent  = t.l_acct;
    document.getElementById('l_'+p+'_email').textContent = t.l_email;
    document.getElementById('l_'+p+'_salary').textContent= t.l_salary;
    document.getElementById(p+'_name').placeholder = t.ph_name;
    document.getElementById(p+'_bank').placeholder = t.ph_bank;
  });
  document.getElementById('l_e_date').textContent = t.l_date_e;

  document.getElementById('btnGenEntry').textContent  = t.btnGenEntry;
  document.getElementById('btnGenExit').textContent   = t.btnGenExit;

/* ── 탭 전환 ── */
function switchTab(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(s=>s.classList.remove('active'));
  document.querySelector('.tab-btn.'+mode).classList.add('active');
  document.getElementById(mode==='entry'?'formEntry':'formExit').classList.add('active');
}

/* ── Toast ── */
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 1800);
}

/* ── 카드 이미지 공통 함수 ── */
function drawCard(ctx, title, lines, W, H, rowH) {
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, W, H);
  const gBar = ctx.createLinearGradient(0,0,W,0);
  gBar.addColorStop(0,'#B8952A'); gBar.addColorStop(0.5,'#E0C060'); gBar.addColorStop(1,'#B8952A');
  ctx.fillStyle = gBar; ctx.fillRect(0,0,W,6);
  ctx.fillStyle = '#1A1A18'; ctx.font = 'bold 24px sans-serif';
  ctx.fillText(title, 32, 50);
  ctx.strokeStyle = '#E8E8E0'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(32,64); ctx.lineTo(W-32,64); ctx.stroke();
  lines.forEach((l,i) => {
    const y = 64 + i * rowH;
    ctx.fillStyle = '#A8A8A0'; ctx.font = '18px sans-serif';
    ctx.fillText(l.label, 32, y+30);
    ctx.fillStyle = '#1A1A18'; ctx.font = 'bold 22px sans-serif';
    ctx.fillText(l.val, 32, y+58);
    ctx.strokeStyle = '#F0F0E8'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(32,y+rowH-4); ctx.lineTo(W-32,y+rowH-4); ctx.stroke();
  });
  ctx.fillStyle = gBar; ctx.fillRect(0,H-4,W,4);
}
function makeCard(title, lines) {
  const W=640, rowH=72, H=80+lines.length*rowH+40;
  const cv = document.createElement('canvas');
  cv.width=W; cv.height=H;
  drawCard(cv.getContext('2d'), title, lines, W, H, rowH);
  return cv.toDataURL('image/png');
}
async function makeCardFile(title, lines, filename) {
  const W=640, rowH=72, H=80+lines.length*rowH+40;
  const cv = document.createElement('canvas');
  cv.width=W; cv.height=H;
  drawCard(cv.getContext('2d'), title, lines, W, H, rowH);
  const blob = await new Promise(res => cv.toBlob(res,'image/png'));
  return new File([blob], filename, {type:'image/png'});
}

/* ── 공유하기 ── */
let _shareText = '';
let _dispatchFiles = [];

async function shareInfo(mode) {
  const isEntry = mode==='entry';
  const p = isEntry?'e':'x';
  const dateRaw = document.getElementById(p+'_date').value;
  const name  = document.getElementById(p+'_name').value  || '—';
  const reg   = document.getElementById(p+'_reg').value   || '—';
  const bank  = document.getElementById(p+'_bank').value  || '—';
  const acct  = document.getElementById(p+'_acct').value  || '—';
  const email = document.getElementById(p+'_email').value || '—';
  const salary = '3,100,000원';
  const storeEl = document.querySelector('#'+(isEntry?'formEntry':'formExit')+' .dp-chip.active');
  const store = storeEl ? storeEl.dataset.val : '—';

  let dateStr = '—';
  if(dateRaw){ const[y,m,d]=dateRaw.split('-'); dateStr=y+'년 '+m+'월 '+d+'일'; }

  const typeLabel = isEntry ? '입사' : '퇴사';
  const dateLabel = isEntry ? '입사일' : '퇴사일';

  _shareText =
    '[최우영씨푸드 ' + typeLabel + ' 근로자 정보]\n\n' +
    '매장     : ' + store + '\n' +
    dateLabel + '  : ' + dateStr + '\n' +
    '성함     : ' + name + '\n' +
    '등록번호 : ' + reg + '\n' +
    '은행명   : ' + bank + '\n' +
    '계좌번호 : ' + acct + '\n' +
    '이메일   : ' + email + '\n' +
    '급여     : ' + salary;

  _dispatchFiles = []; // 파일 없음 — 텍스트만

  const box = document.getElementById('previewBox');
  box.innerHTML =
    '<div class="pv-head">[최우영씨푸드 ' + typeLabel + ' 근로자 정보]</div>' +
    '<div style="height:10px"></div>' +
    row('매장',     store) +
    row(dateLabel,  dateStr) +
    row('성함',     name) +
    row('등록번호', reg) +
    row('은행명',   bank) +
    row('계좌번호', acct) +
    row('이메일',   email) +
    row('급여',     salary);

  document.getElementById('previewModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function row(key, val) {
  return '<div class="pv-row"><span class="pv-key">'+key+'</span><span class="pv-val">'+val+'</span></div>';
}

function closePreview() {
  document.getElementById('previewModal').classList.remove('open');
  document.body.style.overflow = '';
}
function closePreviewBg(e) { if(e.target.id==='previewModal') closePreview(); }

async function doShare() {
  // 모달 먼저 닫으면 공유 시트가 안 뜨는 경우 있음 — 공유 후 닫기
  if(_dispatchFiles.length > 0) {
    try {
      if(navigator.canShare && navigator.canShare({files: _dispatchFiles})) {
        await navigator.share({files: _dispatchFiles});
      } else {
        await navigator.share({text: _shareText});
      }
    } catch(e) {
      if(e.name !== 'AbortError') {
        // 파일 공유 실패 시 텍스트로 재시도
        try { await navigator.share({text: _shareText}); } catch(e2) {}
      }
    }
  } else if(navigator.share) {
    try { await navigator.share({text: _shareText}); } catch(e) {}
  } else {
    navigator.clipboard.writeText(_shareText).then(()=>{
      showToast('클립보드에 복사됐습니다.');
    });
  }
  _dispatchFiles = [];
  closePreview();
}
</script>
<script>
// SW 등록
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
// index에서 파출 버튼으로 왔을 때 자동 오픈
window.addEventListener('DOMContentLoaded', () => {
  if(sessionStorage.getItem('openDispatch') === '1') {
    sessionStorage.removeItem('openDispatch');
    setTimeout(() => openDispatch(), 300);
  }
});
</script>
