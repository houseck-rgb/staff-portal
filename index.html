<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="최우영씨푸드">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>최우영씨푸드그룹</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  font-family: 'Noto Sans KR', sans-serif;
  background: #FFFFFF;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.wrap {
  width: 100%; max-width: 480px;
  padding: 32px 24px;
  display: flex; flex-direction: column;
  align-items: center;
}
.brand {
  font-size: 11px; font-weight: 700; letter-spacing: 0.22em;
  color: #1A3A8F; text-transform: uppercase; margin-bottom: 28px;
  opacity: 0.7;
}
.btn-card {
  display: flex; align-items: center;
  width: 100%;
  background: #FFFFFF;
  border: 3px solid #1A3AFF;
  border-radius: 22px;
  padding: 18px 24px 18px 16px;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.12s, box-shadow 0.12s;
  box-shadow: 0 2px 12px rgba(26,58,255,0.10);
  margin-bottom: 20px;
  gap: 12px;
  overflow: hidden;
}
.btn-card:active { transform: scale(0.97); box-shadow: 0 1px 6px rgba(26,58,255,0.15); }
.btn-card img { width: 90px; height: 90px; object-fit: contain; flex-shrink: 0; }
.btn-label {
  flex: 1;
  font-size: 36px; font-weight: 900;
  color: #0D1F6E;
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.btn-arrow {
  width: 36px; height: 36px;
  background: #1A3AFF;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.btn-arrow svg { width: 18px; height: 18px; }

/* 설치 배너 */
.install-banner {
  display: none;
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  width: calc(100% - 48px); max-width: 432px;
  background: #0D1F6E; color: #fff;
  border-radius: 14px; padding: 14px 18px;
  flex-direction: row; align-items: center; justify-content: space-between;
  gap: 12px; z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
}
.install-banner.show { display: flex; }
.install-txt { font-size: 13px; font-weight: 500; line-height: 1.4; }
.install-btn {
  flex-shrink: 0; padding: 8px 16px;
  background: #FEE500; color: #0D1F6E;
  border: none; border-radius: 8px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer;
}
.install-close {
  flex-shrink: 0; background: none; border: none;
  color: rgba(255,255,255,.6); font-size: 18px; cursor: pointer; padding: 0 4px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Choi Wooyoung Seafood Group</div>

  <!-- 파출 정보 -->
  <a class="https://staff-portal2.vercel.app" id="btnDispatch" href="DISPATCH_URL">
    <img src="icon-dispatch.png" alt="파출 정보">
    <span class="btn-label">파출 정보</span>
    <div class="btn-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>
  </a>

  <!-- 입사 퇴사 -->
  <a class="https://staff-portal1-mu.vercel.app" id="btnWorker" href="WORKER_URL">
    <img src="icon-worker.png" alt="입사 퇴사">
    <span class="btn-label">입사 퇴사</span>
    <div class="btn-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>
  </a>
</div>

<!-- PWA 설치 배너 (Android Chrome) -->
<div class="install-banner" id="installBanner">
  <span class="install-txt">홈 화면에 추가하면<br>앱처럼 바로 실행돼요</span>
  <button class="install-btn" id="installBtn">설치하기</button>
  <button class="install-close" id="installClose">✕</button>
</div>

<script>
// ── PWA 설치 (Android Chrome) ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
});
document.getElementById('installClose').addEventListener('click', () => {
  document.getElementById('installBanner').classList.remove('show');
});
// 설치 완료 시 배너 숨김
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
});
</script>
<script>
if("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js");
</script>
</body>
</html>
