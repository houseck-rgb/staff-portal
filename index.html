<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="최우영씨푸드">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>최우영씨푸드그룹</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;background:#F0F2F8;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.scene{position:relative;width:100vmin;height:100vmin;max-width:100vw;max-height:100vh;}
.scene img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;user-select:none;}
.hit{position:absolute;left:6%;right:6%;border-radius:18px;background:transparent;border:none;cursor:pointer;display:block;text-decoration:none;}
.hit-dispatch{top:27%;height:21%;}
.hit-dispatch:active{background:rgba(255,255,255,.1);}
.hit-worker{top:52%;height:21%;}
.hit-worker:active{background:rgba(0,0,0,.05);}

/* 설치 안내 모달 */
.install-modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:200;align-items:flex-end;justify-content:center;
}
.install-modal.open{display:flex;}
.install-sheet{
  width:100%;max-width:520px;background:#fff;
  border-radius:24px 24px 0 0;padding:24px 24px 48px;
}
.install-handle{width:36px;height:4px;background:#E0E0E0;border-radius:2px;margin:0 auto 20px;}
.install-logo{text-align:center;margin-bottom:16px;}
.install-logo img{width:56px;height:56px;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.15);}
.install-title{text-align:center;font-size:18px;font-weight:700;color:#1A1A18;margin-bottom:6px;}
.install-desc{text-align:center;font-size:13px;color:#888;margin-bottom:24px;line-height:1.6;}
.install-btn{
  width:100%;padding:17px;border:none;border-radius:12px;
  background:#1A3AFF;color:#fff;
  font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;
  cursor:pointer;margin-bottom:10px;
}
.install-btn:active{opacity:.88;}
.install-skip{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:transparent;color:#AAA;
  font-family:'Noto Sans KR',sans-serif;font-size:14px;
  cursor:pointer;
}

/* iOS 안내 모달 */
.ios-modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:200;align-items:flex-end;justify-content:center;
}
.ios-modal.open{display:flex;}
.ios-sheet{
  width:100%;max-width:520px;background:#fff;
  border-radius:24px 24px 0 0;padding:24px 24px 52px;
}
.ios-handle{width:36px;height:4px;background:#E0E0E0;border-radius:2px;margin:0 auto 20px;}
.ios-title{font-size:17px;font-weight:700;color:#1A1A18;margin-bottom:16px;text-align:center;}
.ios-steps{display:flex;flex-direction:column;gap:14px;margin-bottom:24px;}
.ios-step{display:flex;align-items:center;gap:14px;}
.ios-num{width:28px;height:28px;border-radius:50%;background:#1A3AFF;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ios-text{font-size:14px;color:#333;line-height:1.5;}
.ios-text b{color:#1A3AFF;}
.ios-close{width:100%;padding:15px;border:1.5px solid #E0E0E0;border-radius:12px;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:600;color:#666;cursor:pointer;}
</style>
</head>
<body>

<div class="scene">
  <img src="hub-bg.png" alt="최우영씨푸드그룹">
  <a class="hit hit-dispatch" href="https://staff-portal2-mu.vercel.app"></a>
  <a class="hit hit-worker"   href="https://staff-portal1-mu.vercel.app"></a>
</div>

<!-- Android 설치 모달 -->
<div class="install-modal" id="installModal">
  <div class="install-sheet">
    <div class="install-handle"></div>
    <div class="install-logo"><img src="icon-192.png" alt="앱 아이콘"></div>
    <div class="install-title">최우영씨푸드그룹</div>
    <div class="install-desc">홈 화면에 추가하면<br>앱처럼 바로 실행할 수 있습니다.</div>
    <button class="install-btn" id="installBtn">홈 화면에 추가</button>
    <button class="install-skip" id="installSkip">다음에 하기</button>
  </div>
</div>

<!-- iOS 설치 안내 모달 -->
<div class="ios-modal" id="iosModal">
  <div class="ios-sheet">
    <div class="ios-handle"></div>
    <div class="ios-title">홈 화면에 추가하는 방법</div>
    <div class="ios-steps">
      <div class="ios-step">
        <div class="ios-num">1</div>
        <div class="ios-text">하단의 <b>공유 버튼 (□↑)</b> 을 탭하세요</div>
      </div>
      <div class="ios-step">
        <div class="ios-num">2</div>
        <div class="ios-text"><b>홈 화면에 추가</b> 를 선택하세요</div>
      </div>
      <div class="ios-step">
        <div class="ios-num">3</div>
        <div class="ios-text"><b>추가</b> 버튼을 탭하면 완료!</div>
      </div>
    </div>
    <button class="ios-close" id="iosClose">확인</button>
  </div>
</div>

<script>
let deferredPrompt = null;

// ── Android: beforeinstallprompt 감지 ──
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // 이미 설치됐으면 안 보임
  if(!isInstalled()) {
    document.getElementById('installModal').classList.add('open');
  }
});

// ── 설치 버튼 ──
document.getElementById('installBtn').addEventListener('click', async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installModal').classList.remove('open');
});

// ── 다음에 하기 ──
document.getElementById('installSkip').addEventListener('click', () => {
  document.getElementById('installModal').classList.remove('open');
  sessionStorage.setItem('installSkipped','1');
});

// ── iOS 감지 ──
document.getElementById('iosClose').addEventListener('click', () => {
  document.getElementById('iosModal').classList.remove('open');
  sessionStorage.setItem('installSkipped','1');
});

// ── 설치 여부 체크 ──
function isInstalled(){
  return window.matchMedia('(display-mode: standalone)').matches ||
         window.navigator.standalone === true;
}

// ── iOS 판별 ──
function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
}

// ── 페이지 로드 시 ──
window.addEventListener('DOMContentLoaded', () => {
  if(isInstalled()) return; // 이미 설치된 앱으로 실행 중이면 스킵
  if(sessionStorage.getItem('installSkipped')) return; // 이미 스킵했으면 스킵

  if(isIOS()) {
    // iOS는 beforeinstallprompt 없음 → 직접 안내
    setTimeout(() => {
      document.getElementById('iosModal').classList.add('open');
    }, 800);
  }
  // Android는 beforeinstallprompt 이벤트로 처리
});

window.addEventListener('appinstalled', () => {
  document.getElementById('installModal').classList.remove('open');
});

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
