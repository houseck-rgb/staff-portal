<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="최우영씨푸드">
<meta name="mobile-web-app-capable" content="yes">
<title>최우영씨푸드그룹</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  font-family: 'Noto Sans KR', sans-serif;
  background: #FFFFFF;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.wrap {
  width: 100%; max-width: 480px;
  padding: 32px 24px;
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
}
.brand {
  font-size: 11px; font-weight: 700; letter-spacing: 0.22em;
  color: #1A3A8F; text-transform: uppercase; margin-bottom: 28px;
  opacity: 0.7;
}
.btn-card {
  display: flex; align-items: center;
  width: 100%;
  background: #FFFFFF;
  border: 3px solid #1A3AFF;
  border-radius: 22px;
  padding: 18px 24px 18px 16px;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.12s, box-shadow 0.12s;
  box-shadow: 0 2px 12px rgba(26,58,255,0.10);
  margin-bottom: 20px;
  gap: 12px;
  overflow: hidden;
}
.btn-card:active { transform: scale(0.97); box-shadow: 0 1px 6px rgba(26,58,255,0.15); }
.btn-card img {
  width: 90px; height: 90px; object-fit: contain; flex-shrink: 0;
}
.btn-label {
  flex: 1;
  font-size: 36px; font-weight: 900;
  color: #0D1F6E;
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.btn-arrow {
  width: 36px; height: 36px;
  background: #1A3AFF;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.btn-arrow svg { width: 18px; height: 18px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Choi Wooyoung Seafood Group</div>

  <!-- 파출 정보 버튼 -->
  <a class="btn-card" href="app.html#dispatch" id="btnDispatch">
    <img src="icon-dispatch.png" alt="파출 정보">
    <span class="btn-label">파출 정보</span>
    <div class="btn-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>
  </a>

  <!-- 입사 퇴사 버튼 -->
  <a class="btn-card" href="app.html">
    <img src="icon-worker.png" alt="입사 퇴사">
    <span class="btn-label">입사 퇴사</span>
    <div class="btn-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>
  </a>
</div>
<script>
// 파출 버튼: app.html 열고 파출 모달 자동 오픈
document.getElementById('btnDispatch').addEventListener('click', function(e) {
  e.preventDefault();
  sessionStorage.setItem('openDispatch', '1');
  location.href = 'app.html';
});
</script>
</body>
</html>
