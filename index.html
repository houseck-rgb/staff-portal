<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="최우영씨푸드">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>최우영씨푸드그룹</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%;width:100%;
  background:#F0F2F8;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
/* 이미지를 화면에 꽉 채우되 비율 유지 */
.scene{
  position:relative;
  /* 정사각형 이미지 → 세로로 화면 채우기 */
  width:100vmin;
  height:100vmin;
  max-width:100vw;
  max-height:100vh;
}
.scene img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  pointer-events:none;
  user-select:none;
}
/* 투명 클릭 레이어 */
.hit{
  position:absolute;
  left:6%;right:6%;
  border-radius:18px;
  background:transparent;
  border:none;
  cursor:pointer;
  display:block;
  text-decoration:none;
}
/* 파출 정보 카드 위치 (이미지 기준 %) */
.hit-dispatch{
  top:27%;
  height:21%;
}
.hit-dispatch:active{ background:rgba(255,255,255,.1); }

/* 입사 퇴사 카드 위치 */
.hit-worker{
  top:52%;
  height:21%;
}
.hit-worker:active{ background:rgba(0,0,0,.05); }
</style>
</head>
<body>
<div class="scene">
  <img src="hub-bg.png" alt="최우영씨푸드그룹">
  <a class="hit hit-dispatch" href="https://staff-portal2.vercel.app"></a>
  <a class="hit hit-worker"   href="https://staff-portal1-mu.vercel.app"></a>
</div>
<!-- 안드로이드/크롬 설치 배너 -->
<div id="install-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#1A1A18;color:#fff;padding:16px 20px 32px;z-index:999;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.35);">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <div>
      <div style="font-family:sans-serif;font-size:15px;font-weight:700;">📲 홈 화면에 추가</div>
      <div style="font-family:sans-serif;font-size:12px;color:#A8A8A0;margin-top:3px;">최우영씨푸드그룹 앱으로 설치하세요</div>
    </div>
    <button onclick="closeBanner()" style="background:none;border:none;color:#A8A8A0;font-size:22px;cursor:pointer;padding:2px 6px;">✕</button>
  </div>
  <button id="btn-install" style="width:100%;padding:15px;border:none;border-radius:10px;background:#B8952A;color:#fff;font-family:sans-serif;font-size:15px;font-weight:700;cursor:pointer;">설치하기</button>
</div>

<!-- iOS 사파리 안내 배너 -->
<div id="ios-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#1A1A18;color:#fff;padding:20px 24px 36px;z-index:999;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.35);font-family:sans-serif;text-align:center;">
  <div style="font-size:16px;font-weight:700;margin-bottom:10px;">📲 홈 화면에 추가하기</div>
  <div style="font-size:32px;margin:10px 0 6px;">⬆️</div>
  <div style="font-size:13px;color:#CCCCCC;line-height:1.7;">
    하단 <strong>공유 버튼(⬆)</strong>을 누른 후<br>
    <strong>"홈 화면에 추가"</strong>를 선택하세요
  </div>
  <br>
  <button onclick="closeIos()" style="margin-top:16px;padding:10px 32px;border:1.5px solid #555;border-radius:20px;background:none;color:#aaa;font-size:13px;cursor:pointer;">닫기</button>
</div>

<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

const isStandalone = window.matchMedia('(display-mode: standalone)').matches
  || window.navigator.standalone === true;

if(!isStandalone){
  const isIOS    = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

  if(isIOS && isSafari){
    if(!sessionStorage.getItem('ios-shown')){
      setTimeout(()=>{
        document.getElementById('ios-banner').style.display='block';
        sessionStorage.setItem('ios-shown','1');
      }, 900);
    }
  } else {
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      if(!sessionStorage.getItem('install-shown')){
        setTimeout(()=>{
          document.getElementById('install-banner').style.display='block';
          sessionStorage.setItem('install-shown','1');
        }, 900);
      }
    });
    document.getElementById('btn-install').addEventListener('click', async () => {
      if(!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      closeBanner();
    });
  }
}

function closeBanner(){ document.getElementById('install-banner').style.display='none'; }
function closeIos(){    document.getElementById('ios-banner').style.display='none'; }
</script>
</body>
</html>
